name: Keep GeneLens Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping GeneLens to prevent sleep
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 3 --retry-delay 5 https://genelens.streamlit.app/) || STATUS="failed"
          echo "HTTP status: $STATUS"
          echo "Ping sent at $(date -u)"
